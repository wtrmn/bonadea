<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bonadea</title>
    <link href="https://fonts.googleapis.com/css2?family=Felix+Titling&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Felix Titling', serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            position: relative;
            overflow: hidden;
        }

        .hero-image {
            width: 100%;
            height: 100vh;
            object-fit: cover;
            display: block;
            position: absolute;
            top: 0;
            left: 0;
        }

        .overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            align-items: flex-end;
            padding: 40px;
            z-index: 10;
        }

        .bottom-left {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .contact-button {
            color: white;
            font-size: 15px;
            font-family: 'Felix Titling', serif;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
            background: none;
            border: none;
            cursor: pointer;
            text-align: left;
            padding: 5px 0;
            transition: opacity 0.3s ease;
        }

        .contact-button:hover {
            opacity: 0.8;
        }

        .bottom-right {
            color: white;
            font-size: 100px;
            font-weight: bold;
            font-family: 'Felix Titling', serif;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
            letter-spacing: 2px;
        }

        /* Mobile landscape orientation */
        @media (max-width: 768px) and (orientation: landscape) {
            .overlay {
                flex-direction: row;
                padding: 20px;
            }

            .bottom-left {
                gap: 8px;
            }

            .contact-button {
                font-size: 11px;
            }

            .bottom-right {
                font-size: 50px;
            }

            .hero-image {
                height: 100vh;
                width: auto;
            }
        }

        /* Mobile portrait */
        @media (max-width: 600px) {
            .contact-button {
                font-size: 10px;
            }

            .bottom-right {
                font-size: 60px;
            }

            .overlay {
                padding: 20px;
            }

            .bottom-left {
                gap: 10px;
            }
        }

        /* Tablet and small landscape */
        @media (min-width: 601px) and (max-width: 768px) {
            .contact-button {
                font-size: 12px;
            }

            .bottom-right {
                font-size: 75px;
            }

            .overlay {
                padding: 30px;
            }
        }
    </style>
</head>
<body>
    <img src="FRFR.jpg" alt="Bonadea" class="hero-image">
    <div class="overlay">
        <div class="bottom-left">
            <button class="contact-button" onclick="window.open('https://instagram.com/BONADEAVINUM', '_blank')">
                IG: @BONADEAVINUM
            </button>
            <button class="contact-button" onclick="window.location.href='mailto:vinum@bonadea.at'">
                MAIL: VINUM@BONADEA.AT
            </button>
        </div>
        <div class="bottom-right">BONA DEA</div>
    </div>
</body>
</html>
